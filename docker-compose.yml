services:
  postgres:
    image: postgres:16-alpine
    container_name: gymbrain-postgres
    environment:
      POSTGRES_USER: gymbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymbrain_dev_2026}
      POSTGRES_DB: gymbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymbrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gymbrain-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
